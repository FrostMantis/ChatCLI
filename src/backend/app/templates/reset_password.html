<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ChatCLI</title>
  <style>
    :root {
      --bg-primary: #131519;
      --bg-secondary: #1a1d22;
      --border-color: #262a30;
      --text-primary: #e6e8ec;
      --text-secondary: #aab0b8;
      --card-bg: rgba(16, 18, 22, .76);
      --card-border: #262a30;
      --radius: 10px;
      --accent: #5b86ff;
      --accent-quiet: #3b5ed5;
      --transition: 160ms ease;
      --font-sm: .9rem;
      --font-md: 1rem;
      --font-lg: 1.2rem;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 24px);
    }

    .modal {
      width: min(460px, 92vw);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: saturate(120%) blur(6px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, .35);
      padding: clamp(20px, 4vw, 28px);
    }

    .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .4px;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .heading {
      margin: 0 0 6px;
      font-size: var(--font-lg);
      font-weight: 650;
      letter-spacing: .2px;
    }

    .body-copy {
      margin: 0 0 20px;
      color: var(--text-secondary);
      font-size: var(--font-sm);
      line-height: 1.5;
    }

    .auth-form { display: grid; gap: 14px; }

    .field { display: grid; gap: 6px; }

    .label-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label {
      font-weight: 600;
      font-size: var(--font-sm);
      color: var(--text-secondary);
    }

    .input-wrap { position: relative; display: grid; }

    .input {
      width: 100%;
      padding: 11px 44px 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: #0f1216;
      color: var(--text-primary);
      font: inherit;
      font-size: var(--font-md);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input::placeholder { color: color-mix(in srgb, var(--text-secondary) 60%, transparent); }

    .input:focus {
      border-color: color-mix(in srgb, var(--accent) 60%, var(--border-color));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .input.invalid {
      border-color: #ff5c5c;
      box-shadow: 0 0 0 2px rgba(255, 92, 92, .25);
    }

    .icon-btn {
      position: absolute;
      top: 50%; right: 8px;
      transform: translateY(-50%);
      display: inline-grid;
      place-items: center;
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }
    .icon-btn:hover { background: rgba(255,255,255,.05); color: var(--text-primary); }

    /* Password rules tooltip */
    .info-wrap { position: relative; display: inline-flex; align-items: center; }

    .info {
      width: 17px; height: 17px;
      border-radius: 50%;
      display: inline-grid; place-items: center;
      font-size: 10px; font-weight: 700;
      cursor: help;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-color);
      user-select: none;
    }
    .info.valid   { color: var(--accent); border-color: var(--accent); }
    .info.invalid { color: #ff5c5c; border-color: #ff5c5c; }

    .tooltip {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px 12px;
      width: 210px;
      box-shadow: 0 6px 18px rgba(0,0,0,.4);
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
      z-index: 50;
    }
    .info-wrap:hover .tooltip,
    .info-wrap:focus-within .tooltip { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .rules { list-style: none; padding: 0; margin: 0; }
    .rules li {
      display: flex; align-items: center; gap: 6px;
      font-size: var(--font-sm);
      color: var(--text-secondary);
      margin: 4px 0;
    }
    .rules li .sym { font-weight: 700; width: 14px; text-align: center; }
    .rules li.ok  { color: var(--accent); }
    .rules li.bad { color: #ff5c5c; }

    .form-error {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255, 59, 48, .08);
      border: 1px solid rgba(255, 59, 48, .25);
      color: #ff6b6b;
      font-size: var(--font-sm);
      display: none;
    }
    .form-error.visible { display: block; }

    .form-success {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(91, 200, 120, .08);
      border: 1px solid rgba(91, 200, 120, .25);
      color: #5bc878;
      font-size: var(--font-sm);
      display: none;
    }
    .form-success.visible { display: block; }

    .btn-wrap { position: relative; display: grid; margin-top: 4px; }

    .btn {
      position: relative;
      appearance: none;
      border-radius: 8px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 600;
      font-size: var(--font-md);
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-primary);
      background: var(--accent-quiet);
      border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
      width: 100%;
    }
    .btn:hover { background: var(--accent); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    input:-webkit-autofill {
      -webkit-text-fill-color: var(--text-primary);
      -webkit-box-shadow: 0 0 0px 1000px #0f1216 inset;
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="logo">ChatCLI</div>
    <h1 class="heading">Reset your password</h1>
    <p class="body-copy">Enter a new password for <strong>{{ username }}</strong>.</p>

    <form class="auth-form" id="reset-form" novalidate>
      <input type="hidden" name="token" value="{{ token }}">
      <input type="hidden" name="username" value="{{ username }}">

      <div class="field">
        <div class="label-row">
          <label class="label" for="password">New password</label>
          <div class="info-wrap">
            <button type="button" class="info" id="info-btn" aria-label="Password rules">?</button>
            <div class="tooltip" role="tooltip">
              <ul class="rules" id="rules-list">
                <li id="rule-len">  <span class="sym">·</span> At least 8 characters</li>
                <li id="rule-upper"><span class="sym">·</span> One uppercase letter</li>
                <li id="rule-lower"><span class="sym">·</span> One lowercase letter</li>
                <li id="rule-special"><span class="sym">·</span> One special character</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="input-wrap">
          <input class="input" type="password" id="password" name="password" autocomplete="new-password" placeholder="New password">
          <button type="button" class="icon-btn" onclick="toggleVis('password', this)" aria-label="Show password" tabindex="-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label class="label" for="confirm_password">Confirm password</label>
        <div class="input-wrap">
          <input class="input" type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" placeholder="Repeat new password">
          <button type="button" class="icon-btn" onclick="toggleVis('confirm_password', this)" aria-label="Show password" tabindex="-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-error" id="form-error"></div>
      <div class="form-success" id="form-success"></div>

      <div class="btn-wrap">
        <button class="btn" type="submit" id="submit-btn">Reset password</button>
      </div>
    </form>
  </div>

  <script>
    const pwdInput  = document.getElementById('password');
    const confInput = document.getElementById('confirm_password');
    const errorBox  = document.getElementById('form-error');
    const successBox = document.getElementById('form-success');
    const submitBtn = document.getElementById('submit-btn');
    const infoBtn   = document.getElementById('info-btn');

    const rules = {
      len:     { el: document.getElementById('rule-len'),     test: v => v.length >= 8 },
      upper:   { el: document.getElementById('rule-upper'),   test: v => /[A-Z]/.test(v) },
      lower:   { el: document.getElementById('rule-lower'),   test: v => /[a-z]/.test(v) },
      special: { el: document.getElementById('rule-special'), test: v => /[^A-Za-z0-9]/.test(v) },
    };

    function updateRules(val) {
      let allOk = true;
      for (const key in rules) {
        const ok = rules[key].test(val);
        if (!ok) allOk = false;
        rules[key].el.className = val.length ? (ok ? 'ok' : 'bad') : '';
        rules[key].el.querySelector('.sym').textContent = val.length ? (ok ? '✓' : '✗') : '·';
      }
      infoBtn.className = 'info' + (val.length === 0 ? '' : allOk ? ' valid' : ' invalid');
      return allOk;
    }

    function toggleVis(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
      successBox.classList.remove('visible');
    }

    function clearError() {
      errorBox.classList.remove('visible');
    }

    pwdInput.addEventListener('input', () => {
      updateRules(pwdInput.value);
      clearError();
    });

    confInput.addEventListener('input', clearError);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const pwd  = pwdInput.value;
      const conf = confInput.value;

      if (!updateRules(pwd)) {
        pwdInput.classList.add('invalid');
        showError('Password does not meet the requirements.');
        return;
      }
      pwdInput.classList.remove('invalid');

      if (pwd !== conf) {
        confInput.classList.add('invalid');
        showError('Passwords do not match.');
        return;
      }
      confInput.classList.remove('invalid');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting…';

      const formData = new FormData(e.target);
      const body = Object.fromEntries(formData.entries());
      body.password = pwd;
      body.confirm_password = conf;

      try {
        const res = await fetch('/user/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          successBox.textContent = 'Password reset! You can now log in with your new password.';
          successBox.classList.add('visible');
          e.target.style.display = 'none';
        } else {
          showError(data.message || 'Something went wrong. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset password';
        }
      } catch {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset password';
      }
    });
  </script>
</body>
</html>
